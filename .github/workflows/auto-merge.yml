name: Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable auto-merge for trusted PRs
    runs-on: ubuntu-latest
    # Only run for PRs from the same repository (not forks) by trusted bots
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        github.actor == 'dependabot[bot]' ||
        github.actor == 'release-please[bot]' ||
        github.actor == 'github-actions[bot]'
      )
    steps:
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr review "$PR_NUMBER" --approve --repo "$REPO"

      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$PR_NUMBER" --auto --squash --repo "$REPO"
