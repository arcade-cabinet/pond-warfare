name: Visual Regression

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  browser-audit:
    name: Visual Regression
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser runtime
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser audit visual regression
        run: pnpm verify:browser-audit

      - name: Upload current browser audit captures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-audit-current
          path: tests/browser/screenshots/audit-current

      - name: Upload browser audit diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-audit-diff
          path: tests/browser/screenshots/audit-diff
