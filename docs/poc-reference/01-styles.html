<!--
  POC Reference: CSS & Styles (pond_craft.html lines 1-77)

  Ported to: src/styles/main.css

  Key elements:
  - Canvas layering: game-canvas, fog-canvas, light-canvas (absolute positioned)
  - Fog: opacity 0.9, mix-blend-mode: multiply
  - Day-night overlay: mix-blend-mode: multiply
  - Light canvas: mix-blend-mode: screen
  - UI panel: dark slate theme with Courier New monospace
  - Action buttons: gradient background with beveled border illusion
  - Screen shake animation: 0.15s, ±4px offset
  - Scrollbar theming, tooltip styling
  - All touch-action: none for game containers
-->

<style>
    body { margin: 0; overflow: hidden; background-color: #000; user-select: none; overscroll-behavior: none; }

    #game-container, #game-canvas, #minimap-container { touch-action: none; }

    #game-canvas, #fog-canvas, #light-canvas, .render-pixelated {
        image-rendering: pixelated;
    }
    #game-canvas, #fog-canvas, #light-canvas {
        display: block;
        position: absolute;
        top: 0; left: 0;
        pointer-events: none;
    }
    #fog-canvas { opacity: 0.9; mix-blend-mode: multiply; }
    #day-night-overlay { mix-blend-mode: multiply; transition: background-color 0.1s; }
    #light-canvas { mix-blend-mode: screen; }

    .ui-panel {
        background-color: #1e293b;
        color: #e2e8f0;
        font-family: 'Courier New', Courier, monospace;
        text-shadow: 1px 1px 0 #000;
    }
    .action-btn {
        background: linear-gradient(to bottom, #334155, #1e293b);
        border: 2px solid #64748b;
        border-bottom-color: #0f172a; border-right-color: #0f172a;
        cursor: pointer; transition: filter 0.1s;
    }
    .action-btn:active {
        border: 2px solid #0f172a;
        border-bottom-color: #64748b; border-right-color: #64748b;
        background: #1e293b;
    }
    .action-btn:hover:not(:disabled) { filter: brightness(1.2); }
    .action-btn:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
    .action-btn .hotkey-badge {
        position: absolute; top: 2px; right: 3px;
        font-size: 9px; color: #94a3b8; background: rgba(0,0,0,0.5);
        padding: 0 3px; border-radius: 2px; line-height: 1.3;
    }

    #game-over-banner, #intro-overlay h1 { text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

    .tooltip {
        position: absolute; background: #0f172a; border: 1px solid #475569;
        color: #e2e8f0; padding: 4px 8px; font-size: 11px; pointer-events: none;
        z-index: 100; white-space: nowrap; border-radius: 3px;
        font-family: 'Courier New', monospace; text-shadow: 1px 1px 0 #000;
        box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    }

    @keyframes screenShake {
        0%, 100% { transform: translate(0,0); }
        25% { transform: translate(-4px, 3px); }
        50% { transform: translate(3px, -4px); }
        75% { transform: translate(-3px, -2px); }
    }
    .screen-shake { animation: screenShake 0.15s ease-in-out; }

    @keyframes pulse-ring {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: scale(2); opacity: 0; }
    }
</style>
