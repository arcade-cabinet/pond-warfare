<!--
  POC Reference: HTML Layout & UI Structure (pond_craft.html lines 79-165)

  Ported to: src/ui/app.tsx, src/ui/hud.tsx, src/ui/sidebar.tsx,
             src/ui/selection-panel.tsx, src/ui/action-panel.tsx,
             src/ui/minimap-panel.tsx, src/ui/game-over.tsx,
             src/ui/intro-overlay.tsx

  Layout:
  - Body: flex row (desktop) / flex col-reverse (mobile)
  - Left sidebar (w-64): minimap → selection info → action panel
  - Right game container (flex-1): top bar → canvases → overlays

  Key UI elements:
  - Top bar: resources (clams/twigs/food) + rates, clock, status, speed, mute
  - Idle worker button: absolute top-right, animated pulse
  - Army select button: absolute top-right below idle
  - Ctrl group indicators: absolute top-left
  - 4 canvas layers: game, fog, day-night overlay div, light
  - Intro overlay: fades out after 1.5s
  - Game over banner: hidden until win/lose
-->

<body class="flex flex-col-reverse md:flex-row h-screen w-screen text-sm text-slate-200">

    <!-- SIDEBAR: Minimap + Selection + Actions -->
    <div class="w-full md:w-64 h-48 md:h-full flex flex-row md:flex-col ui-panel z-20 shadow-2xl flex-shrink-0 border-t-4 md:border-t-0 md:border-r-4 border-slate-600">

        <!-- Minimap Section -->
        <div class="w-1/3 md:w-full md:h-64 p-1 md:p-2 bg-black flex justify-center items-center border-r-2 md:border-r-0 md:border-b-4 border-slate-700">
            <div id="minimap-container" class="relative w-full h-full max-w-[200px] max-h-[200px] cursor-crosshair border-2 border-slate-600">
                <canvas id="minimap" width="200" height="200" class="w-full h-full block render-pixelated"></canvas>
                <div id="minimap-cam" class="absolute border border-white pointer-events-none hidden box-border" style="left:0; top:0;"></div>
            </div>
        </div>

        <!-- Selection Info Panel -->
        <div id="selection-info" class="w-1/3 md:w-full flex-1 p-2 md:p-4 border-r-2 md:border-r-0 md:border-b-4 border-slate-700 flex flex-col gap-1 md:gap-2 overflow-y-auto bg-slate-900">
            <div class="flex flex-col sm:flex-row gap-2 md:gap-3 items-start">
                <canvas id="portrait-canvas" width="64" height="64" class="hidden bg-slate-800 border-2 border-slate-600 rounded-sm shadow-inner w-12 h-12 md:w-16 md:h-16 render-pixelated flex-shrink-0 cursor-pointer hover:border-sky-400 transition-colors" title="Click to track unit"></canvas>
                <div class="flex-1 w-full">
                    <h2 id="sel-name" class="text-base md:text-xl font-bold text-sky-300 leading-tight">No Selection</h2>
                    <div id="sel-hp-bar" class="w-full h-3 md:h-4 bg-red-900 hidden border border-slate-900 mt-1">
                        <div id="sel-hp-fill" class="h-full bg-green-500 transition-all duration-200" style="width: 100%;"></div>
                    </div>
                    <div id="sel-stats" class="text-slate-300 text-xs md:text-sm mt-1"></div>
                    <p id="sel-desc" class="text-[10px] md:text-xs text-slate-400 leading-tight"></p>
                </div>
            </div>
        </div>

        <!-- Action Panel (dynamically populated) -->
        <div id="action-panel" class="w-1/3 md:w-full h-full md:h-64 p-1 md:p-3 grid grid-cols-2 sm:grid-cols-3 gap-1 md:gap-2 bg-slate-800 overflow-y-auto content-start"></div>
    </div>

    <!-- GAME CONTAINER -->
    <div id="game-container" class="flex-1 relative cursor-crosshair overflow-hidden bg-black">

        <!-- Top HUD Bar -->
        <div class="absolute top-0 left-0 w-full h-10 md:h-12 ui-panel border-0 border-b-2 md:border-b-4 flex items-center justify-between px-2 md:px-6 z-20 bg-opacity-95 text-xs md:text-sm">
            <!-- Resources: Clams, Twigs, Food -->
            <div class="flex space-x-3 md:space-x-6">
                <div class="flex items-center space-x-1 md:space-x-2">
                    <div class="w-3 h-3 md:w-4 md:h-4 bg-slate-300 border border-slate-100 shadow-sm rounded-full"></div>
                    <span class="hidden md:inline">Clams: </span><span id="res-clams" class="text-slate-200 font-bold">200</span>
                    <span id="res-clams-rate" class="text-[10px] text-green-400 hidden md:inline"></span>
                </div>
                <div class="flex items-center space-x-1 md:space-x-2">
                    <div class="w-3 h-3 md:w-4 md:h-4 bg-amber-700 border border-amber-500 shadow-sm"></div>
                    <span class="hidden md:inline">Twigs: </span><span id="res-twigs" class="text-amber-600 font-bold">50</span>
                    <span id="res-twigs-rate" class="text-[10px] text-green-400 hidden md:inline"></span>
                </div>
                <div class="flex items-center space-x-1 md:space-x-2">
                    <div class="w-3 h-3 md:w-4 md:h-4 bg-red-600 border border-red-400 shadow-sm rounded-sm"></div>
                    <span class="hidden md:inline">Food: </span><span id="res-food" class="text-red-400 font-bold">0/0</span>
                </div>
            </div>
            <!-- Status, Clock, Speed, Mute -->
            <div class="flex items-center space-x-2 md:space-x-4">
                <div id="status-display" class="text-green-400 font-bold uppercase tracking-widest hidden sm:block">Peaceful</div>
                <div id="clock-display" class="text-sky-200 font-bold">Day 1 - 08:00</div>
                <div class="flex items-center gap-1">
                    <button id="speed-btn" title="Game Speed (F)">1x</button>
                    <button id="mute-btn" title="Toggle Sound (M)">🔊</button>
                </div>
            </div>
        </div>

        <!-- Floating Buttons -->
        <button id="idle-worker-btn" class="hidden" title="Select idle worker (.)">
            <span class="w-3 h-3 bg-amber-400 rounded-full animate-pulse"></span>
            <span id="idle-worker-count">3 Idle</span>
        </button>
        <button id="select-army-btn" class="hidden" title="Select all army (,)">
            ⚔️ Army (<span id="army-count">0</span>)
        </button>
        <div id="ctrl-groups" class="absolute top-14 left-2 md:left-6 z-20 flex flex-col gap-1 hidden md:flex"></div>

        <!-- Canvas Layers -->
        <canvas id="game-canvas"></canvas>
        <canvas id="fog-canvas"></canvas>
        <div id="day-night-overlay" class="absolute inset-0 pointer-events-none z-10"></div>
        <canvas id="light-canvas"></canvas>

        <!-- Intro Overlay -->
        <div id="intro-overlay" class="absolute inset-0 bg-black z-50">
            <h1>Pond Warfare</h1>
            <p>Establish your economy before the predators arrive.</p>
            <p>Right-click to command • WASD to scroll • Ctrl+# to set groups</p>
        </div>

        <!-- Game Over Banner -->
        <div id="game-over-banner" class="hidden">
            <h1 id="go-title">Victory</h1>
            <p id="go-desc">The Pond is Safe!</p>
            <p id="go-stats"></p>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>
</body>
