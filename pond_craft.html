    placeBuilding() {
        let type = this.placingBuilding, cg = 0, cw = 0;
        if(type==='burrow') cw=100; if(type==='armory'){cg=250; cw=150;} if(type==='tower'){cg=200; cw=250;}
        
        let bx = Math.round(this.mouse.worldX/TILE_SIZE)*TILE_SIZE, by = Math.round(this.mouse.worldY/TILE_SIZE)*TILE_SIZE;
        
        // FIX: Check placement validity
        if (!this.canPlaceBuilding(bx, by, type)) {
            AudioSys.sfx.error();
            this.floatingTexts.push({x: bx, y: by - 30, t: "Can't build here!", c: '#ef4444', life: 60});
            return;
        }
        
        if (this.resources.clams >= cg && this.resources.twigs >= cw) {
            this.resources.clams -= cg; this.resources.twigs -= cw;
            let b = new Entity(type, bx, by, 'player');
            this.stats.buildingsBuilt++;
            this.selection.forEach(u => { if(u.type === 'gatherer') u.cmdBuild(b); });
            this.placingBuilding = null; this.updateUI();
        }
    },

    train(b, type, cg, cw, cf) {
        if (this.resources.clams >= cg && this.resources.twigs >= cw && this.resources.food < this.resources.maxFood) {
            this.resources.clams -= cg; this.resources.twigs -= cw; this.resources.food += cf; 
            b.q = b.q || []; b.q.push(type); if (!b.qTimer || b.q.length === 1) b.qTimer = 180;
            this.updateUI();
        }
    },

    cancelTrain(b, index) {
        let type = b.q.splice(index, 1)[0];
        let cg = 0, cw = 0, cf = 1;
        if(type === 'gatherer') { cg=50; cw=0; }
        if(type === 'brawler') { cg=100; cw=50; }
        if(type === 'sniper') { cg=80; cw=80; }
        this.resources.clams += cg; this.resources.twigs += cw; this.resources.food -= cf;
        if (index === 0 && b.q.length > 0) b.qTimer = 180; 
        if (b.q.length === 0) b.qTimer = 0;
        this.updateUI();
    },

    setGameOver(result) {
        if (this.state !== 'playing') return;
        this.state = result;
        const banner = document.getElementById('game-over-banner'), title = document.getElementById('go-title'), desc = document.getElementById('go-desc');
        const statsEl = document.getElementById('go-stats');
        banner.classList.remove('hidden');
        
        // NEW: Stats display
        let day = Math.floor(this.frameCount/28800)+1;
        statsEl.textContent = `Day ${day} | Kills: ${this.stats.unitsKilled} | Lost: ${this.stats.unitsLost} | Gathered: ${this.stats.resourcesGathered} | Buildings: ${this.stats.buildingsBuilt}`;
        
        if (result === 'win') {
            AudioSys.sfx.win(); title.textContent = 'Victory'; title.className = 'text-4xl md:text-6xl font-black text-amber-400 mb-4 tracking-widest uppercase shadow-lg'; desc.textContent = 'The Pond is Safe!';
        } else {
            AudioSys.sfx.lose(); title.textContent = 'Defeat'; title.className = 'text-4xl md:text-6xl font-black text-red-600 mb-4 tracking-widest uppercase shadow-lg'; desc.textContent = 'Your Lodge was destroyed.';
        }
    },

    getLerpedColor(timeInHours) {
        let i = 0; while (i < TIME_STOPS.length - 1 && TIME_STOPS[i+1].h <= timeInHours) i++;
        let start = TIME_STOPS[i], end = TIME_STOPS[i+1] || TIME_STOPS[i];
        if (start === end) return `rgb(${start.c[0]}, ${start.c[1]}, ${start.c[2]})`;
        let t = (timeInHours - start.h) / (end.h - start.h);
        let r = Math.round(start.c[0] + (end.c[0] - start.c[0]) * t), g = Math.round(start.c[1] + (end.c[1] - start.c[1]) * t), b = Math.round(start.c[2] + (end.c[2] - start.c[2]) * t);
        this.ambientDarkness = 1.0 - (r / 255); return `rgb(${r}, ${g}, ${b})`;
    },

    loop(timestamp) {
        let dt = timestamp - this.lastTime;
        if (dt > 1000/60) {
            if (this.state === 'playing') {
                for (let i = 0; i < this.gameSpeed; i++) this.updateLogic();
            }
            this.draw(); this.lastTime = timestamp;
        }
        requestAnimationFrame((t) => this.loop(t));
    },

    updateLogic() {
        this.frameCount++;
        
        this.timeOfDay += 0.05; if (this.timeOfDay >= 24*60) this.timeOfDay = 0;
        let hrs = Math.floor(this.timeOfDay/60), mins = Math.floor(this.timeOfDay%60);
        document.getElementById('clock-display').textContent = `Day ${Math.floor(this.frameCount/28800)+1} - ${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}`;
        document.getElementById('day-night-overlay').style.backgroundColor = this.getLerpedColor(this.timeOfDay / 60);

        this.fireflies.forEach(f => {
            f.x += f.vx; f.y += f.vy; f.phase += 0.05; f.vx += (Math.random() - 0.5) * 0.1;
            if (f.vx > 1) f.vx = 1; if (f.vx < -1) f.vx = -1;
            let margin = 200;
            if (f.x < this.camX - margin) f.x = this.camX + this.width + margin; if (f.x > this.camX + this.width + margin) f.x = this.camX - margin;
            if (f.y < this.camY - margin) f.y = this.camY + this.height + margin; if (f.y > this.camY + this.height + margin) f.y = this.camY - margin;
        });

        let s = 12, e = 20, manualPan = false;
        if (this.keys['w'] || this.keys['arrowup'] || (this.mouse.in && this.mouse.y < e && !this.mouse.isDown)) { this.camY -= s; manualPan = true; }
        if (this.keys['s'] || this.keys['arrowdown'] || (this.mouse.in && this.mouse.y > this.height-e && !this.mouse.isDown)) { this.camY += s; manualPan = true; }
        // FIX: Don't pan left when pressing 'a' for attack-move (only pan with arrow keys and screen edge)
        if (this.keys['arrowleft'] || (this.mouse.in && this.mouse.x < e && !this.mouse.isDown)) { this.camX -= s; manualPan = true; }
        if (this.keys['d'] || this.keys['arrowright'] || (this.mouse.in && this.mouse.x > this.width-e && !this.mouse.isDown)) { this.camX += s; manualPan = true; }
        if (manualPan) this.isTracking = false;

        if (this.isTracking && this.selection.length > 0) {
            let cx = 0, cy = 0, validCount = 0;
            for (let u of this.selection) if (u.hp > 0) { cx += u.x; cy += u.y; validCount++; }
            if (validCount > 0) {
                cx /= validCount; cy /= validCount;
                this.camX += ((cx - this.width / 2) - this.camX) * 0.1;
                this.camY += ((cy - this.height / 2) - this.camY) * 0.1;
            } else this.isTracking = false;
        }

        this.camX = Math.max(0, Math.min(WORLD_WIDTH - this.width, this.camX)); 
        this.camY = Math.max(0, Math.min(WORLD_HEIGHT - this.height, this.camY));

        // FIX: Iterate backwards to safely handle entity removal during update
        for (let i = this.entities.length - 1; i >= 0; i--) {
            if (this.entities[i]) this.entities[i].update();
        }
        for (let i = this.projectiles.length - 1; i >= 0; i--) if (this.projectiles[i].update()) this.projectiles.splice(i, 1);
        for (let i = this.particles.length - 1; i >= 0; i--) { let p = this.particles[i]; p.life--; p.y -= p.vy; p.x += p.vx; if (p.life <= 0) this.particles.splice(i, 1); }
        for (let i = this.floatingTexts.length - 1; i >= 0; i--) { let f = this.floatingTexts[i]; f.life--; f.y -= 0.5; if (f.life <= 0) this.floatingTexts.splice(i, 1); }
        for (let i = this.minimapPings.length - 1; i >= 0; i--) { this.minimapPings[i].life--; if (this.minimapPings[i].life <= 0) this.minimapPings.splice(i, 1); }
        for (let i = this.groundPings.length - 1; i >= 0; i--) { this.groundPings[i].life--; if (this.groundPings[i].life <= 0) this.groundPings.splice(i, 1); }
        for (let i = this.corpses.length - 1; i >= 0; i--) { this.corpses[i].life--; if (this.corpses[i].life <= 0) this.corpses.splice(i, 1); }

        // NEW: Update explored fog
        if (this.frameCount % 10 === 0) {
            for (let ent of this.entities) {
                if (ent.faction === 'player') {
                    let rad = ent.isBuilding ? 16 : 10;
                    let ex = Math.floor(ent.x / 16), ey = Math.floor(ent.y / 16);
                    this.exploredCtx.fillStyle = 'rgba(255,255,255,0.15)';
                    this.exploredCtx.beginPath();
                    this.exploredCtx.arc(ex, ey, rad, 0, Math.PI*2);
                    this.exploredCtx.fill();
                }
            }
        }

        // Screen shake timer
        if (this.shakeTimer > 0) this.shakeTimer--;

        let statusEl = document.getElementById('status-display');
        let isPeaceful = this.frameCount < this.peaceTimer;
        
        if (isPeaceful) {
            statusEl.textContent = `Peaceful (${Math.ceil((this.peaceTimer - this.frameCount)/60)}s)`;
            statusEl.className = 'text-green-400 font-bold uppercase tracking-widest hidden sm:block';
        } else {
            statusEl.textContent = 'Hunting!';
            statusEl.className = 'text-red-500 font-bold uppercase tracking-widest animate-pulse hidden sm:block';
            if (this.frameCount % 1800 === 0) { 
                let nests = this.entities.filter(e => e.type === 'predator_nest');
                let th = this.entities.find(e => e.type === 'lodge' && e.faction === 'player');
                if (nests.length > 0 && th) {
                    AudioSys.sfx.alert();
                    let waveSize = Math.min(6, 1 + Math.floor((this.frameCount - this.peaceTimer) / 7200)); 
                    nests.forEach(nest => {
                        for(let i=0; i<waveSize; i++) {
                            let type = Math.random() > 0.5 ? 'gator' : 'snake';
                            let o = new Entity(type, nest.x + (Math.random()-.5)*60, nest.y + 30 + (Math.random()-.5)*30, 'enemy');
                            o.cmdAtk(th);
                        }
                    });
                }
            }
        }

        // NEW: Player units heal slowly out of combat (every 5 seconds, +1 HP)
        if (this.frameCount % 300 === 0) {
            this.entities.forEach(ent => {
                if (ent.faction === 'player' && !ent.isBuilding && !ent.isResource && ent.hp < ent.maxHp && ent.hp > 0) {
                    if (ent.state === 'idle' || ent.state === 'move' || ent.state === 'gath' || ent.state === 'g_move' || ent.state === 'r_move') {
                        ent.hp = Math.min(ent.maxHp, ent.hp + 1);
                    }
                }
            });
        }

        if (this.frameCount % 60 === 0) {
            let playerTH = this.entities.some(e => e.type === 'lodge' && e.faction === 'player');
            let nestsLeft = this.entities.some(e => e.type === 'predator_nest');
            if (!playerTH) this.setGameOver('lose'); else if (!nestsLeft) this.setGameOver('win');
        }

        // FIX: Only update queue fill bar, NOT full UI rebuild (was causing infinite loop)
        if (this.frameCount % 3 === 0 && this.selection.length === 1 && this.selection[0].isBuilding && this.selection[0].q && this.selection[0].q.length > 0) {
            let fillEl = document.getElementById('q-fill-active');
            if (fillEl) fillEl.style.height = `${(1 - this.selection[0].qTimer/180)*100}%`;
        }

        if (this.frameCount % 30 === 0) {
            let maxF = 0, curF = 0, idleCount = 0, armyCount = 0;
            this.entities.forEach(e => {
                if (e.faction === 'player') {
                    if (e.type==='lodge' && e.progress>=100) maxF += 4;
                    if (e.type==='burrow' && e.progress>=100) maxF += 4;
                    if (!e.isBuilding && !e.isResource) { curF++; if (e.type !== 'gatherer') armyCount++; }
                    if (e.type === 'gatherer' && e.state === 'idle') idleCount++;
                }
            });
            this.resources.food = curF; this.resources.maxFood = maxF;
            document.getElementById('res-clams').textContent = this.resources.clams;
            document.getElementById('res-twigs').textContent = this.resources.twigs;
            let fEl = document.getElementById('res-food'); fEl.textContent = `${curF}/${maxF}`;
            fEl.className = curF >= maxF ? 'text-red-500 font-bold' : 'text-red-400 font-bold';
            
            // NEW: Track army peak
            if (armyCount > this.stats.peakArmy) this.stats.peakArmy = armyCount;
            
            let idleBtn = document.getElementById('idle-worker-btn');
            if (idleCount > 0) { idleBtn.classList.remove('hidden'); document.getElementById('idle-worker-count').textContent = `${idleCount} Idle`;
            } else idleBtn.classList.add('hidden');

            let armyBtn = document.getElementById('select-army-btn');
            if (armyCount > 0) { armyBtn.classList.remove('hidden'); document.getElementById('army-count').textContent = `${armyCount}`;
            } else armyBtn.classList.add('hidden');
            
            // FIX: Only update HP bar for single selection, NOT full UI rebuild
            if (this.selection.length === 1) {
                let sel = this.selection[0];
                let hpFill = document.getElementById('sel-hp-fill');
                if (hpFill) {
                    hpFill.style.width = `${Math.max(0, (sel.hp/sel.maxHp)*100)}%`;
                    let hpPct = sel.hp / sel.maxHp;
                    hpFill.style.background = hpPct > 0.6 ? '#22c55e' : hpPct > 0.3 ? '#eab308' : '#ef4444';
                }
                let descEl = document.getElementById('sel-desc');
                if (descEl && !sel.isResource) {
                    let statusText = sel.progress < 100 ? `Building ${Math.floor(sel.progress)}%` : sel.state;
                    if (sel.heldRes) statusText += ` (carrying ${sel.heldRes})`;
                    if (sel.isBuilding && sel.q && sel.q.length > 0) statusText = `Training (${sel.q.length} queued)`;
                    descEl.textContent = `Status: ${statusText}`;
                }
            }
            
            // NEW: Resource income rate tracking
            if (this.frameCount % 120 === 0) {
                this.resTracker.rateClams = this.resources.clams - this.resTracker.lastClams;
                this.resTracker.rateTwigs = this.resources.twigs - this.resTracker.lastTwigs;
                this.resTracker.lastClams = this.resources.clams;
                this.resTracker.lastTwigs = this.resources.twigs;
                let clamRate = document.getElementById('res-clams-rate');
                let twigRate = document.getElementById('res-twigs-rate');
                if (clamRate) {
                    let r = this.resTracker.rateClams;
                    clamRate.textContent = r >= 0 ? `+${r}` : `${r}`;
                    clamRate.className = `text-[10px] hidden md:inline ${r >= 0 ? 'text-green-400' : 'text-red-400'}`;
                }
                if (twigRate) {
                    let r = this.resTracker.rateTwigs;
                    twigRate.textContent = r >= 0 ? `+${r}` : `${r}`;
                    twigRate.className = `text-[10px] hidden md:inline ${r >= 0 ? 'text-green-400' : 'text-red-400'}`;
                }
            }
            
            this.updateCtrlGroupUI();
        }
    },

    draw() {
        let c = this.ctx; c.fillStyle = '#000'; c.fillRect(0, 0, this.width, this.height);
        
        c.save(); 
        
        // NEW: Screen shake offset
        let shakeX = 0, shakeY = 0;
        if (this.shakeTimer > 0) {
            shakeX = (Math.random() - 0.5) * this.shakeTimer;
            shakeY = (Math.random() - 0.5) * this.shakeTimer;
        }
        c.translate(-Math.floor(this.camX) + shakeX, -Math.floor(this.camY) + shakeY);
        c.drawImage(this.bgCanvas, 0, 0);

        // Draw Corpses & Ruins
        for (let cp of this.corpses) {
            if (cp.x + 100 > this.camX && cp.x - 100 < this.camX + this.width && cp.y + 100 > this.camY && cp.y - 100 < this.camY + this.height) {
                c.globalAlpha = Math.min(1, cp.life / 60) * 0.7;
                c.drawImage(cp.sprite, cp.x - cp.sprite.width/2, cp.y - cp.sprite.height/2 + (cp.sprite === this.sprites.bones ? 4 : 0));
                c.globalAlpha = 1.0;
            }
        }
        
        let sorted = [...this.entities].sort((a,b) => a.y - b.y);
        for (let e of sorted) {
            if (e.x + 100 > this.camX && e.x - 100 < this.camX + this.width && e.y + 100 > this.camY && e.y - 100 < this.camY + this.height) e.draw(c);
        }

        for (let p of this.groundPings) {
            let progress = 1 - (p.life / p.maxLife);
            c.strokeStyle = `rgba(${p.c}, ${1 - progress})`; c.lineWidth = 2;
            c.beginPath(); c.arc(p.x, p.y, progress * 15, 0, Math.PI * 2); c.stroke();
            // NEW: Second ring for more visible ping
            c.beginPath(); c.arc(p.x, p.y, progress * 8, 0, Math.PI * 2); c.stroke();
        }

        for (let p of this.particles) { 
            c.globalAlpha = Math.min(1, p.life / 10);
            c.fillStyle = p.c; c.fillRect(p.x, p.y, p.s, p.s); 
        }
        c.globalAlpha = 1.0;
        for (let p of this.projectiles) p.draw(c);

        // Rally point display
        if (this.selection.length === 1 && this.selection[0].isBuilding && this.selection[0].rallyPos) {
            let b = this.selection[0], rp = b.rallyPos; c.strokeStyle = '#38bdf8'; c.lineWidth = 2; c.setLineDash([5, 5]);
            c.beginPath(); c.moveTo(b.x, b.y); c.lineTo(rp.x, rp.y); c.stroke();
            c.setLineDash([]); c.fillStyle = '#38bdf8'; c.beginPath(); c.arc(rp.x, rp.y, 4, 0, Math.PI*2); c.fill();
            // NEW: Animated rally flag
            let flagBob = Math.sin(this.frameCount * 0.1) * 2;
            c.fillStyle = '#38bdf8'; 
            c.fillRect(rp.x, rp.y - 14 + flagBob, 8, 6);
            c.fillRect(rp.x, rp.y - 14, 1, 14);
        }
        
        // NEW: Tower/sniper range ring when selected
        for (let sel of this.selection) {
            if (sel.atkRange > 60 && sel.selected) {
                c.strokeStyle = 'rgba(239, 68, 68, 0.25)'; c.lineWidth = 1; c.setLineDash([4, 4]);
                c.beginPath(); c.arc(sel.x, sel.y, sel.atkRange, 0, Math.PI * 2); c.stroke();
                c.setLineDash([]);
            }
        }

        c.font = "bold 14px 'Courier New'"; c.textAlign = "center";
        for (let f of this.floatingTexts) {
            c.fillStyle = f.c; c.globalAlpha = Math.min(1, f.life / 30); c.fillText(f.t, f.x, f.y);
            c.lineWidth = 1; c.strokeStyle = '#000'; c.strokeText(f.t, f.x, f.y);
        }
        c.globalAlpha = 1.0;

        if (this.mouse.isDown && !this.placingBuilding) {
            c.strokeStyle = '#22c55e'; c.lineWidth = 1;
            let x = Math.min(this.mouse.startX, this.mouse.worldX), y = Math.min(this.mouse.startY, this.mouse.worldY);
            let w = Math.abs(this.mouse.worldX - this.mouse.startX), h = Math.abs(this.mouse.worldY - this.mouse.startY);
            c.strokeRect(x, y, w, h); c.fillStyle = 'rgba(34, 197, 94, 0.15)'; c.fillRect(x, y, w, h);
            // NEW: Corner dots on selection rectangle
            c.fillStyle = '#22c55e';
            [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([px,py]) => {
                c.beginPath(); c.arc(px, py, 3, 0, Math.PI*2); c.fill();
            });
        }

        if (this.placingBuilding) {
            let bx = Math.round(this.mouse.worldX/TILE_SIZE)*TILE_SIZE, by = Math.round(this.mouse.worldY/TILE_SIZE)*TILE_SIZE;
            let spr = this.sprites[this.placingBuilding];
            let ok = this.canPlaceBuilding(bx, by, this.placingBuilding);
            let canAfford = (this.placingBuilding==='burrow' && this.resources.twigs>=100) || 
                     (this.placingBuilding==='armory' && this.resources.clams>=250 && this.resources.twigs>=150) ||
                     (this.placingBuilding==='tower' && this.resources.clams>=200 && this.resources.twigs>=250);
            ok = ok && canAfford;
            c.globalAlpha = 0.5; c.drawImage(spr, bx - spr.width/2, by - spr.height/2);
            c.fillStyle = ok ? 'rgba(0,255,0,0.3)' : 'rgba(255,0,0,0.5)';
            c.fillRect(bx - spr.width/2, by - spr.height/2, spr.width, spr.height); c.globalAlpha = 1.0;
            
            // NEW: Show placement text
            c.font = "bold 11px 'Courier New'"; c.textAlign = "center";
            c.fillStyle = ok ? '#22c55e' : '#ef4444';
            c.fillText(ok ? 'Click to place (Esc cancel)' : (canAfford ? 'Blocked!' : 'Not enough resources'), bx, by - spr.height/2 - 8);
        }
        c.restore();

        // Fog of War
        let fc = this.fogCtx; fc.clearRect(0,0,this.width, this.height);
        fc.globalCompositeOperation = 'source-over'; fc.save();
        let driftX = -(this.camX * 0.2 + this.frameCount * 0.1) % 256, driftY = -(this.camY * 0.2 + this.frameCount * 0.05) % 256;
        fc.translate(driftX, driftY); fc.fillStyle = this.fogPattern;
        fc.fillRect(-256, -256, this.width + 512, this.height + 512); fc.restore();

        fc.globalCompositeOperation = 'destination-out';
        for (let e of this.entities) {
            if (e.faction === 'player' && e.x + 400 > this.camX && e.x - 400 < this.camX + this.width && e.y + 400 > this.camY && e.y - 400 < this.camY + this.height) {
                let sx = e.x - this.camX + shakeX, sy = e.y - this.camY + shakeY, rad = e.isBuilding ? 250 : 150;
                let grad = fc.createRadialGradient(sx, sy, rad*0.2, sx, sy, rad);
                grad.addColorStop(0, 'rgba(0,0,0,1)'); grad.addColorStop(0.6, 'rgba(0,0,0,0.8)'); grad.addColorStop(1, 'rgba(0,0,0,0)');
                fc.fillStyle = grad; fc.beginPath(); fc.arc(sx, sy, rad, 0, Math.PI*2); fc.fill();
            }
        }
        fc.globalCompositeOperation = 'source-over';

        // Lighting
        let lc = this.lightCtx; lc.clearRect(0,0,this.width, this.height);
        if (this.ambientDarkness > 0.05) {
            lc.save(); lc.translate(-Math.floor(this.camX) + shakeX, -Math.floor(this.camY) + shakeY);
            for (let e of this.entities) {
                if (e.x + 200 > this.camX && e.x - 200 < this.camX + this.width && e.y + 200 > this.camY && e.y - 200 < this.camY + this.height) {
                    let rad = 0, rgb = '';
                    if (e.type === 'lodge' && e.progress >= 100) { rad = 150; rgb = '251, 191, 36'; }
                    else if (e.type === 'tower' && e.progress >= 100) { rad = 120; rgb = '251, 191, 36'; }
                    else if (e.type === 'predator_nest') { rad = 100; rgb = '239, 68, 68'; }
                    else if (e.faction === 'player' && !e.isBuilding) { rad = 60; rgb = '253, 230, 138'; }

                    if (rad > 0) {
                        let lGrad = lc.createRadialGradient(e.x, e.y, rad*0.1, e.x, e.y, rad);
                        let pulse = 0.8 + Math.sin(this.frameCount * 0.05 + e.x) * 0.1;
                        lGrad.addColorStop(0, `rgba(${rgb}, ${this.ambientDarkness * pulse})`); lGrad.addColorStop(1, `rgba(${rgb}, 0)`);
                        lc.fillStyle = lGrad; lc.beginPath(); lc.arc(e.x, e.y, rad, 0, Math.PI*2); lc.fill();
                    }
                }
            }
            for (let f of this.fireflies) {
                if (f.x > this.camX && f.x < this.camX + this.width && f.y > this.camY && f.y < this.camY + this.height) {
                    let alpha = (Math.sin(f.phase) * 0.5 + 0.5) * this.ambientDarkness;
                    lc.beginPath(); lc.arc(f.x, f.y, 2, 0, Math.PI*2); lc.fillStyle = `rgba(163, 230, 53, ${alpha})`; lc.fill();
                    lc.beginPath(); lc.arc(f.x, f.y, 6, 0, Math.PI*2); lc.fillStyle = `rgba(163, 230, 53, ${alpha * 0.3})`; lc.fill();
                }
            }
            lc.restore();
        }

        // Minimap
        let mc = this.minimapCtx; mc.fillStyle = PALETTE.waterDeep; mc.fillRect(0, 0, 200, 200); let sx = 200/WORLD_WIDTH, sy = 200/WORLD_HEIGHT;
        
        // NEW: Draw explored areas on minimap with subtle tint
        mc.globalAlpha = 0.15;
        mc.drawImage(this.exploredCanvas, 0, 0, 200, 200);
        mc.globalAlpha = 1;
        
        for (let e of this.entities) {
            if(e.type==='cattail') mc.fillStyle = PALETTE.reedGreen; else if(e.type==='clambed') mc.fillStyle = PALETTE.clamShell;
            else if(e.faction==='player') mc.fillStyle = '#38bdf8'; else if(e.type==='predator_nest') mc.fillStyle = '#7f1d1d';
            else if(e.faction==='enemy') mc.fillStyle = '#ef4444'; else mc.fillStyle = '#fff';
            let s = e.isBuilding ? 4 : 2; mc.fillRect(e.x*sx - s/2, e.y*sy - s/2, s, s);
        }
        
        for (let p of this.minimapPings) {
            let alpha = p.life / p.maxLife; let radius = 4 + (Math.sin(p.life * 0.2) * 2); 
            mc.strokeStyle = `rgba(239, 68, 68, ${alpha})`; mc.lineWidth = 1.5;
            mc.strokeRect((p.x * sx) - radius, (p.y * sy) - radius, radius * 2, radius * 2);
        }

        let mCam = document.getElementById('minimap-cam'); mCam.classList.remove('hidden');
        mCam.style.left = `${this.camX * sx}px`; mCam.style.top = `${this.camY * sy}px`; mCam.style.width = `${this.width * sx}px`; mCam.style.height = `${this.height * sy}px`;
    }
};

class Entity {
    constructor(type, x, y, faction) {
        this.type = type; this.x = x; this.y = y; this.faction = faction; this.sprite = GAME.sprites[type];
        this.width = this.sprite.width; this.height = this.sprite.height; this.radius = this.width/2.5;
        this.selected = false; this.state = 'idle'; this.facingLeft = false;
        
        this.isBuilding = ['lodge', 'burrow', 'armory', 'tower', 'predator_nest'].includes(type);
        this.isResource = ['cattail', 'clambed'].includes(type);
        this.rallyPos = null;
        
        this.hp = this.maxHp = type==='lodge'?1500 : type==='predator_nest'?1000 : type==='tower'?500 : type==='burrow'?300 : type==='armory'?600 : type==='gatherer'?30 : type==='sniper'?40 : 60;
        
        // NEW: Tower gets dmg property
        this.dmg = 0;
        if (!this.isBuilding && !this.isResource) {
            this.speed = type==='gatherer'? 2.0 : type==='snake'? 2.0 : type==='sniper'? 1.6 : 1.8;
            this.dmg = type==='gatherer'? 2 : type==='sniper'? 8 : type==='snake'? 4 : 6;
            this.atkRange = type==='sniper' ? 180 : 40; 
            this.atkCD = 0;
        }
        if (type === 'tower') { this.atkRange = 200; this.atkCD = 0; this.dmg = 10; }
        if (this.isResource) this.resAmount = type==='cattail' ? 1000 : 25000;
        
        this.progress = 100;
        if (this.isBuilding && faction === 'player' && type !== 'lodge') { this.progress = 1; this.hp = 1; }

        // NEW: Kill tracking
        this.kills = 0;
        
        // NEW: Flash timer for damage feedback
        this.flashTimer = 0;
        
        // NEW: Attack-move state
        this.attackMoveTarget = null;

        if (faction === 'player') {
            if (!this.isBuilding && GAME.tech.sharpSticks && this.dmg) this.dmg += 2;
            if (this.isBuilding && GAME.tech.sturdyMud) { this.maxHp += 300; this.hp += 300; }
            if (!this.isBuilding && !this.isResource && GAME.tech.swiftPaws) this.speed += 0.4;
            if (type === 'sniper' && GAME.tech.eagleEye) this.atkRange += 50;
        }
        
        GAME.entities.push(this);
    }

    takeDamage(amount, attacker) {
        if (this.hp <= 0) return; this.hp -= amount; AudioSys.sfx.hit();
        this.flashTimer = 8; // NEW: Damage flash
        for(let i=0;i<5;i++) GAME.particles.push({x:this.x, y:this.y-10, vx:(Math.random()-.5)*2, vy:Math.random()*2, life:15, c: this.isBuilding?PALETTE.mudLight:PALETTE.clamMeat, s:3});
        
        GAME.floatingTexts.push({x: this.x + (Math.random()*10-5), y: this.y - this.height/2 - 5, t: `-${amount}`, c: '#ef4444', life: 40});

        if (this.hp > 0 && attacker) {
            if (this.faction === 'player' && attacker.faction === 'enemy') GAME.addPing(this.x, this.y);
            // FIX: Don't interrupt building (b_move/build) to attack
            if (!this.isBuilding && ['idle', 'gath', 'g_move', 'r_move', 'move'].includes(this.state) && this.dmg) this.cmdAtk(attacker);
            GAME.entities.forEach(e => {
                if (e !== this && e.faction === this.faction && !e.isBuilding && e.hp > 0 && e.dmg) {
                    if (['idle', 'move'].includes(e.state)) { 
                        let dist = Math.sqrt((e.x - this.x)**2 + (e.y - this.y)**2);
                        if (dist < 300) e.cmdAtk(attacker); 
                    }
                }
            });
        }
        if (this.hp <= 0) this.die();
    }
    
    update() {
        if (this.hp <= 0 && !this.isResource) { this.die(); return; }
        if (this.atkCD > 0) this.atkCD--;
        if (this.flashTimer > 0) this.flashTimer--;

        if (this.isBuilding && this.progress >= 100) {
            if (this.type === 'armory' && GAME.frameCount % 5 === 0) {
                GAME.particles.push({x: this.x + 8, y: this.y - 12, vx: (Math.random()-0.5)*0.5, vy: -0.5 - Math.random()*0.5, life: 60, c: 'rgba(156, 163, 175, 0.4)', s: Math.random()*3+2});
            }
            if (this.type === 'lodge' && GAME.frameCount % 30 === 0) {
                GAME.particles.push({x: this.x + (Math.random()-.5)*20, y: this.y + 10 + Math.random()*10, vx: 0, vy: -0.2, life: 30, c: 'rgba(56, 189, 248, 0.5)', s: 2});
            }
        }

        if (this.type === 'tower' && this.progress >= 100 && this.atkCD <= 0) {
            let targets = GAME.entities.filter(e => e.faction !== this.faction && e.hp > 0 && !e.isResource);
            let closest = null, minDist = this.atkRange;
            for(let t of targets) { let d = Math.sqrt((t.x-this.x)**2 + (t.y-this.y)**2); if (d < minDist) { minDist = d; closest = t; } }
            if (closest) {
                AudioSys.sfx.shoot();
                GAME.projectiles.push(new Projectile(this.x, this.y-20, closest.x, closest.y, closest, this.dmg, this));
                this.atkCD = 50;
            }
        }

        if (this.state === 'idle' && this.dmg && !this.isBuilding && GAME.frameCount % 30 === 0) {
            let aggroRad = this.faction === 'enemy' ? 250 : 200;
            let targets = GAME.entities.filter(e => e.faction !== this.faction && e.hp > 0 && !e.isResource && e.faction !== 'neutral');
            let closeTarget = targets.find(t => Math.sqrt((t.x - this.x)**2 + (t.y - this.y)**2) < aggroRad);
            if (closeTarget) this.cmdAtk(closeTarget);
        }
        
        // NEW: Attack-move scan - units moving to a location will attack enemies they pass by
        if (this.state === 'atk_move' && this.tPos && GAME.frameCount % 15 === 0) {
            let scanRad = this.atkRange > 60 ? this.atkRange : 150;
            let targets = GAME.entities.filter(e => e.faction !== this.faction && e.hp > 0 && !e.isResource && e.faction !== 'neutral');
            let closeTarget = null, minDist = scanRad;
            for (let t of targets) {
                let d = Math.sqrt((t.x - this.x)**2 + (t.y - this.y)**2);
                if (d < minDist) { minDist = d; closeTarget = t; }
            }
            if (closeTarget) {
                this.attackMoveTarget = this.tPos;
                this.cmdAtk(closeTarget);
            }
        }
        
        // NEW: After killing target from attack-move, resume moving
        if (this.state === 'idle' && this.attackMoveTarget) {
            let tp = this.attackMoveTarget;
            this.attackMoveTarget = null;
            this.cmdAttackMove(tp.x, tp.y);
        }

        // NEW: Idle gatherers near resources auto-gather (soft assist)
        if (this.state === 'idle' && this.type === 'gatherer' && this.faction === 'player' && GAME.frameCount % 90 === 0) {
            // Only auto-gather if not holding resources
            if (!this.heldRes) {
                let nearRes = GAME.entities.filter(e => e.isResource && e.resAmount > 0);
                let closest = null, minDist = 120; // Short range auto-gather
                for (let r of nearRes) {
                    let d = Math.sqrt((r.x - this.x)**2 + (r.y - this.y)**2);
                    if (d < minDist) { minDist = d; closest = r; }
                }
                if (closest) this.cmdGather(closest);
            }
        }

        if (!this.isBuilding && !this.isResource) {
            if (['move', 'g_move', 'r_move', 'a_move', 'b_move', 'atk_move', 'rep_move'].includes(this.state) && this.tPos) {
                let dx = this.tPos.x - this.x, dy = this.tPos.y - this.y, dist = Math.sqrt(dx*dx + dy*dy);
                if (dx !== 0) this.facingLeft = dx < 0; 
                
                let targetRad = 0;
                if (this.state === 'g_move' && this.tEnt) targetRad = this.tEnt.radius;
                if (this.state === 'r_move' && this.rEnt) targetRad = this.rEnt.radius;
                if (this.state === 'b_move' && this.tEnt) targetRad = this.tEnt.radius;
                if (this.state === 'rep_move' && this.tEnt) targetRad = this.tEnt.radius;

                let arriveDist = this.speed;
                if (['g_move', 'r_move', 'b_move', 'rep_move'].includes(this.state)) arriveDist = this.radius + targetRad + 15;
                if (this.state === 'a_move') arriveDist = this.atkRange;
                if (this.state === 'atk_move') arriveDist = this.speed;
                
                if (dist <= arriveDist) this.arrive();
                else { this.x += (dx/dist)*this.speed; this.y += (dy/dist)*this.speed; this.yOff = Math.sin(GAME.frameCount*(this.type==='snake'?0.6:0.3))*3; }
            }
            
            if (this.state === 'gath') {
                if (!this.tEnt || this.tEnt.resAmount <= 0) { 
                    // FIX: Try to find another nearby resource of same type
                    if (this.tEnt) {
                        let resType = this.tEnt.type;
                        let nearby = GAME.entities.filter(e => e.type === resType && e.resAmount > 0);
                        let closest = null, minDist = 300;
                        for (let r of nearby) {
                            let d = Math.sqrt((r.x - this.x)**2 + (r.y - this.y)**2);
                            if (d < minDist) { minDist = d; closest = r; }
                        }
                        if (closest) { this.cmdGather(closest); return; }
                    }
                    this.state = 'idle'; return; 
                }
                if (GAME.frameCount % 30 === 0) { AudioSys.sfx[this.tEnt.type==='cattail'?'chop':'mine'](); this.part(this.tEnt.type==='cattail'?PALETTE.reedBrown:PALETTE.clamMeat); }
                if (--this.gTimer <= 0) {
                    this.heldRes = this.tEnt.type==='cattail'?'twigs':'clams';
                    this.tEnt.resAmount -= 10; if(this.tEnt.resAmount<=0) this.tEnt.die();
                    GAME.stats.resourcesGathered += 10;
                    let h = GAME.entities.find(e=>e.type==='lodge' && e.faction==='player');
                    if (h) { this.rEnt = h; this.tPos={x:h.x,y:h.y}; this.state='r_move'; } else { this.state='idle'; }
                }
            }
            if (this.state === 'build') {
                if (!this.tEnt || this.tEnt.hp >= this.tEnt.maxHp) { this.state = 'idle'; return; }
                if (GAME.frameCount % 20 === 0) { AudioSys.sfx.build(); this.part(PALETTE.mudLight); }
                if (--this.gTimer <= 0) {
                    this.tEnt.hp += 10; this.tEnt.progress = (this.tEnt.hp/this.tEnt.maxHp)*100;
                    if (this.tEnt.hp >= this.tEnt.maxHp) { this.tEnt.hp=this.tEnt.maxHp; this.tEnt.progress=100; this.state='idle'; }
                    this.gTimer = 30; 
                }
            }
            // NEW: Repair state
            if (this.state === 'repair') {
                if (!this.tEnt || this.tEnt.hp >= this.tEnt.maxHp) { this.state = 'idle'; return; }
                if (GAME.frameCount % 20 === 0) { AudioSys.sfx.build(); this.part('#22c55e'); }
                if (--this.gTimer <= 0) {
                    // Repair costs 1 twig per 5 HP
                    if (GAME.resources.twigs >= 1) {
                        GAME.resources.twigs -= 1;
                        this.tEnt.hp = Math.min(this.tEnt.maxHp, this.tEnt.hp + 5);
                        if (this.tEnt.hp >= this.tEnt.maxHp) { this.state = 'idle'; }
                    } else {
                        GAME.floatingTexts.push({x: this.x, y: this.y - 20, t: "No twigs!", c: '#ef4444', life: 40});
                        this.state = 'idle';
                    }
                    this.gTimer = 40;
                }
            }
            if (this.state === 'atk') {
                if (!this.tEnt || this.tEnt.hp <= 0) { this.state = 'idle'; return; }
                let dx = this.tEnt.x - this.x, dy = this.tEnt.y - this.y; this.facingLeft = dx < 0;
                if (Math.sqrt(dx*dx + dy*dy) <= this.atkRange) {
                    if (this.atkCD <= 0) {
                        if (this.type === 'sniper') {
                            AudioSys.sfx.shoot();
                            GAME.projectiles.push(new Projectile(this.x, this.y-10, this.tEnt.x, this.tEnt.y, this.tEnt, this.dmg, this));
                        } else {
                            this.tEnt.takeDamage(this.dmg, this);
                        }
                        this.atkCD = 60;
                    }
                } else { this.tPos={x:this.tEnt.x,y:this.tEnt.y}; this.state='a_move'; }
            }

            // Collision separation
            for (let o of GAME.entities) {
                if (o===this || o.isBuilding || o.isResource) continue;
                let dx = this.x - o.x, dy = this.y - o.y, distSq = dx*dx + dy*dy, md = this.radius+o.radius;
                if (distSq < md*md && distSq>0) {
                    let actualDist = Math.sqrt(distSq);
                    let f = (md - actualDist)*0.15; // Slightly stronger push
                    this.x += (dx/actualDist)*f; this.y += (dy/actualDist)*f;
                }
            }
            
            // NEW: Keep units in world bounds
            this.x = Math.max(20, Math.min(WORLD_WIDTH - 20, this.x));
            this.y = Math.max(20, Math.min(WORLD_HEIGHT - 20, this.y));
        }

        if (this.isBuilding && this.faction === 'player' && this.q && this.q.length > 0) {
            if (--this.qTimer <= 0) {
                let t = this.q.shift(), sx = this.x + (Math.random()>.5?1:-1)*30, sy = this.y + this.height/2 + 20;
                let newEnt = new Entity(t, sx, sy, 'player');
                if (this.rallyPos) newEnt.cmdMove(this.rallyPos.x, this.rallyPos.y); 
                if (this.q.length > 0) this.qTimer = 180;
                if (this.selected) GAME.updateUI();
                
                // NEW: Training complete notification particle burst
                for(let j=0; j<8; j++) GAME.particles.push({x: sx, y: sy, vx:(Math.random()-.5)*3, vy:Math.random()*2, life:20, c:'#38bdf8', s:3});
            }
        }
        
        // NEW: Enemy nests spawn reinforcements when attacked
        if (this.type === 'predator_nest' && this.hp < this.maxHp * 0.5 && GAME.frameCount % 600 === 0) {
            let nearbyDefenders = GAME.entities.filter(e => e.faction === 'enemy' && !e.isBuilding && Math.sqrt((e.x-this.x)**2+(e.y-this.y)**2) < 300);
            if (nearbyDefenders.length < 4) {
                let type = Math.random() > 0.5 ? 'gator' : 'snake';
                let defender = new Entity(type, this.x + (Math.random()-.5)*60, this.y + 30, 'enemy');
                // Find nearest player unit to attack
                let targets = GAME.entities.filter(e => e.faction === 'player' && e.hp > 0);
                let closest = null, minDist = 400;
                for (let t of targets) { 
                    let d = Math.sqrt((t.x-this.x)**2+(t.y-this.y)**2); 
                    if (d < minDist) { minDist = d; closest = t; }
                }
                if (closest) defender.cmdAtk(closest);
            }
        }
    }
    
    arrive() {
        this.yOff = 0;
        if (this.state === 'move') { this.state = 'idle'; this.tPos = null; }
        else if (this.state === 'atk_move') { this.state = 'idle'; this.tPos = null; this.attackMoveTarget = null; }
        else if (this.state === 'g_move') { this.state = 'gath'; this.gTimer = 60; }
        else if (this.state === 'b_move') { this.state = 'build'; this.gTimer = 30; }
        else if (this.state === 'rep_move') { this.state = 'repair'; this.gTimer = 40; }
        else if (this.state === 'r_move') {
            if (this.heldRes) {
                let color = this.heldRes === 'clams' ? '#fde047' : '#f97316';
                let txt = `+10 ${this.heldRes.charAt(0).toUpperCase() + this.heldRes.slice(1)}`;
                GAME.floatingTexts.push({x: this.x, y: this.y - 20, t: txt, c: color, life: 60});
                
                GAME.resources[this.heldRes] += 10; this.heldRes = null;
                if (this.tEnt && this.tEnt.resAmount>0) { this.tPos={x:this.tEnt.x,y:this.tEnt.y}; this.state='g_move'; }
                else { this.state='idle'; this.tPos = null; }
            } else { this.state='idle'; this.tPos = null; }
        }
        else if (this.state === 'a_move') this.state = 'atk';
    }

    cmdMove(x, y) { this.tPos={x,y}; this.state='move'; this.tEnt=null; this.attackMoveTarget=null; }
    cmdGather(ent) { this.tEnt=ent; this.tPos={x:ent.x, y:ent.y}; this.state='g_move'; }
    cmdBuild(ent) { this.tEnt=ent; this.tPos={x:ent.x, y:ent.y}; this.state='b_move'; }
    cmdAtk(ent) { this.tEnt=ent; this.tPos={x:ent.x, y:ent.y}; this.state='a_move'; }
    cmdReturn(ent) { this.rEnt=ent; this.tPos={x:ent.x, y:ent.y}; this.state='r_move'; }
    // NEW: Repair command
    cmdRepair(ent) { this.tEnt=ent; this.tPos={x:ent.x, y:ent.y}; this.state='rep_move'; }
    // NEW: Attack-move command
    cmdAttackMove(x, y) { this.tPos={x,y}; this.state='atk_move'; this.tEnt=null; }
    
    part(color) { 
        if (this.tEnt) GAME.particles.push({x:this.tEnt.x+(Math.random()-.5)*20, y:this.tEnt.y-10, vx:0, vy:1, life:10, c:color, s:2}); 
    }

    die() {
        // FIX: Prevent double-die
        if (this._dead) return;
        this._dead = true;
        
        let i = GAME.entities.indexOf(this); if(i>-1) GAME.entities.splice(i,1);
        i = GAME.selection.indexOf(this); 
        if(i>-1) { GAME.selection.splice(i,1); this.selected = false; if(GAME.selection.length === 0 || this.selected) GAME.updateUI(); }
        
        // NEW: Stats tracking
        if (this.faction === 'player' && !this.isBuilding && !this.isResource) GAME.stats.unitsLost++;
        if (this.faction === 'enemy' && !this.isBuilding) GAME.stats.unitsKilled++;
        
        // NEW: Screen shake for building destruction
        if (this.isBuilding) GAME.triggerShake();
        
        for(let j=0; j<20; j++) GAME.particles.push({x:this.x, y:this.y, vx:(Math.random()-.5)*4, vy:(Math.random()-.5)*4+2, life:30, c: this.isBuilding?PALETTE.mudLight:PALETTE.clamMeat, s:4});
        
        // Battlefield Corpses/Ruins
        if (!this.isResource) {
            GAME.corpses.push({
                x: this.x, y: this.y,
                sprite: this.isBuilding ? GAME.sprites.rubble : GAME.sprites.bones,
                life: 1800, maxLife: 1800 
            });
        }
        
        // NEW: Credit kill to attacker (find who was targeting this)
        // This is approximate - credits the first attacker found
        for (let ent of GAME.entities) {
            if (ent.tEnt === this && ent.state === 'atk') {
                ent.kills++;
                break;
            }
        }
    }

    draw(c) {
        let dx = this.x - this.width/2, dy = this.y - this.height/2 + (this.yOff||0);
        
        // Shadow
        c.fillStyle = 'rgba(0, 0, 0, 0.4)';
        c.beginPath(); c.ellipse(this.x, this.y + this.height/2 - 2, this.radius, this.radius/2, 0, 0, Math.PI*2); c.fill();

        // Selection brackets
        if (this.selected) {
            let pad = 2; let bx = dx - pad, by = dy - pad; let bw = this.width + pad*2, bh = this.height + pad*2; let l = 6; 
            c.strokeStyle = '#38bdf8'; c.lineWidth = 2; c.beginPath();
            c.moveTo(bx, by+l); c.lineTo(bx, by); c.lineTo(bx+l, by); c.moveTo(bx+bw-l, by); c.lineTo(bx+bw, by); c.lineTo(bx+bw, by+l); 
            c.moveTo(bx, by+bh-l); c.lineTo(bx, by+bh); c.lineTo(bx+l, by+bh); c.moveTo(bx+bw-l, by+bh); c.lineTo(bx+bw, by+bh); c.lineTo(bx+bw, by+bh-l); 
            c.stroke();
        }

        c.save();
        if (this.facingLeft && !this.isBuilding) {
            c.translate(this.x, this.y); c.scale(-1, 1); c.translate(-this.x, -this.y);
        }

        // NEW: Damage flash tint
        if (this.flashTimer > 0) {
            c.globalAlpha = 0.7;
        }

        if (this.isBuilding && this.progress < 100) {
            c.globalAlpha = 0.5 + (this.progress/200);
            c.drawImage(this.sprite, 0, this.sprite.height*(1-this.progress/100), this.width, this.height*(this.progress/100), dx, dy + this.height*(1-this.progress/100), this.width, this.height*(this.progress/100));
            c.globalAlpha = 1.0; c.strokeStyle = '#b45309'; c.strokeRect(dx, dy, this.width, this.height); 
            
            // NEW: Construction progress percentage text
            c.font = "bold 10px 'Courier New'"; c.textAlign = 'center';
            c.fillStyle = '#fbbf24'; c.fillText(Math.floor(this.progress) + '%', this.x, dy - 4);
        } else {
            c.drawImage(this.sprite, dx, dy);
        }
        
        // NEW: Red tint overlay when taking damage
        if (this.flashTimer > 0) {
            c.globalCompositeOperation = 'source-atop';
            c.fillStyle = `rgba(255, 60, 60, ${this.flashTimer / 12})`;
            c.fillRect(dx, dy, this.width, this.height);
            c.globalCompositeOperation = 'source-over';
        }
        
        c.globalAlpha = 1.0;
        c.restore();
        
        if (this.heldRes) { 
            c.fillStyle = this.heldRes==='clams'?PALETTE.clamShell:PALETTE.reedBrown; 
            c.fillRect(this.x+5, this.y-20, 6, 6); 
            // NEW: Tiny sparkle on carried resource
            if (GAME.frameCount % 20 < 5) {
                c.fillStyle = '#fff'; c.fillRect(this.x+7, this.y-22, 2, 2);
            }
        }

        // Health bar
        if (this.selected || (this.hp < this.maxHp && !this.isResource)) {
            let bw = this.width*0.8, bh = 4;
            c.fillStyle = '#7f1d1d'; c.fillRect(this.x-bw/2, dy-8, bw, bh);
            let hpPct = this.hp / this.maxHp;
            c.fillStyle = hpPct > 0.6 ? '#22c55e' : hpPct > 0.3 ? '#eab308' : '#ef4444';
            c.fillRect(this.x-bw/2, dy-8, bw*hpPct, bh);
        }
        
        // NEW: Veterancy stars (kill indicators)
        if (this.kills >= 3 && !this.isBuilding && !this.isResource) {
            let stars = Math.min(3, Math.floor(this.kills / 3));
            c.font = "8px 'Courier New'"; c.textAlign = 'center';
            c.fillStyle = '#fbbf24';
            c.fillText('★'.repeat(stars), this.x, dy - 12);
        }
    }
}

window.onload = () => GAME.init();
</script>
</body>
